<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;color:#1a1a1a;background:#f8fafc;padding:16px}
.nav{display:flex;gap:4px;padding:12px 0 16px;border-bottom:1px solid #e5e7eb;margin-bottom:20px}
.nav button{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;color:#6b7280;transition:all .15s}
.nav button.active{background:#e6c800;color:#111827;font-weight:700}
.card{background:#fff;border:0.5px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:500;color:#6b7280;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
textarea{width:100%;padding:8px 10px;border:0.5px solid #d1d5db;border-radius:8px;font-size:14px;background:#fff;color:#111827;outline:none;resize:none;overflow:hidden;min-height:36px;height:36px;line-height:1.5;font-family:inherit}
textarea:focus{border-color:#9ca3af}
textarea.prefilled{background:#fffbeb;border-color:#fcd34d}
textarea.warning{background:#fff5f5;border-color:#f87171;color:#dc2626}
input[type=text],input[type=password],input[type=date],select{width:100%;padding:8px 10px;border:0.5px solid #d1d5db;border-radius:8px;font-size:14px;background:#fff;color:#111827;outline:none}
input:focus,select:focus{border-color:#9ca3af}
.btn{padding:8px 16px;border:0.5px solid #d1d5db;border-radius:8px;cursor:pointer;font-size:13px;background:#fff;color:#111827;transition:all .15s}
.btn:hover{background:#f3f4f6}
.btn-primary{background:#111827;color:#e6c800;border-color:#111827;font-weight:700}
.btn-primary:hover{background:#333}
.btn-sm{padding:4px 10px;font-size:12px}
.toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;border:0.5px solid;max-width:280px}
.toast.ok{background:#dcfce7;color:#166534;border-color:#86efac}
.toast.err{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.toast.info{background:#fef9c3;color:#854d0e;border-color:#fcd34d}
.row{display:flex;gap:8px;align-items:center}
.missing-tag{display:inline-block;padding:2px 8px;background:#fee2e2;color:#991b1b;border:0.5px solid #fca5a5;border-radius:20px;font-size:11px;margin-top:3px}
.leave-tag{display:inline-block;padding:2px 8px;background:#f3f4f6;color:#6b7280;border:0.5px solid #d1d5db;border-radius:20px;font-size:11px;margin-top:3px}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:0.5px solid #e5e7eb;border-radius:8px;margin-bottom:8px}
.item-line{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.item-line .idx{font-size:12px;color:#6b7280;width:16px;text-align:right;flex-shrink:0}
.item-line input{flex:1;min-width:0}
.item-line input.prefilled{border-color:#fcd34d;background:#fffbeb}
.del-btn{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0;opacity:.5;transition:opacity .15s}
.del-btn:hover{opacity:1;color:#dc2626}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.report-block{border:0.5px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px}
.report-block.on-leave{background:#f9fafb;opacity:.8}
.dept-anchor{display:inline-block;font-size:13px;font-weight:500;color:#6b7280;background:#f3f4f6;border:0.5px solid #e5e7eb;border-radius:20px;padding:3px 12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.dept-anchor:hover{background:#111827;color:#e6c800;border-color:#111827}
.dept-section-title{font-size:11px;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;padding:12px 0 8px;border-top:0.5px solid #e5e7eb;margin-top:4px}
.dept-section-title:first-of-type{border-top:none;padding-top:0;margin-top:0}
.period-tab{padding:5px 14px;border:0.5px solid #d1d5db;border-radius:20px;cursor:pointer;font-size:13px;background:#fff;color:#6b7280;transition:all .15s}
.period-tab.active{background:#111827;color:#e6c800;border-color:#111827;font-weight:700}
.period-tab:hover:not(.active){background:#f3f4f6}
.locked-box{background:#f9fafb;border:0.5px solid #e5e7eb;border-radius:12px;padding:32px 20px;text-align:center;margin-bottom:14px}
.member-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f9fafb;border-radius:8px;margin-bottom:4px;cursor:grab;user-select:none;border:0.5px solid transparent}
.member-row.dragging{opacity:.4}
.member-row.drag-over{border-color:#3b82f6;background:#eff6ff}
.drag-handle{color:#9ca3af;font-size:14px;padding:0 2px;opacity:.5}
.leave-btn{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid #d1d5db;background:#fff;color:#6b7280;cursor:pointer;white-space:nowrap;transition:all .15s}
.leave-btn:hover{background:#f3f4f6}
.leave-btn.cancel{color:#dc2626;border-color:#fca5a5}
.leave-btn.cancel:hover{background:#fee2e2}
</style>

<script>
const D={leaves:{},reports:{},config:{departments:[],adminPassword:'0000'}};
const UI={
  view:'report',adminWeek:getFriday(new Date()),currentWeek:getFriday(new Date()),
  dept:'',name:'',thisItems:['','','','',''],thisPre:Array(5).fill(false),
  nextItems:['','',''],editing:false,adminAuth:false,personName:'',
  period:'year',year:new Date().getFullYear(),toast:null,drag:null,
  _newDept:'',_newU:{},_newUDate:{}
};

function toStr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function getFriday(date){const d=new Date(date);d.setHours(0,0,0,0);const wd=d.getDay();d.setDate(d.getDate()-wd+(wd===0?-2:5));return toStr(d);}
function getMonday(fri){const d=new Date(fri);d.setDate(d.getDate()-4);return toStr(d);}
function prevW(w){const d=new Date(w);d.setDate(d.getDate()-7);return toStr(d);}
function nextW(w){const d=new Date(w);d.setDate(d.getDate()+7);return toStr(d);}
function todayStr(){return toStr(new Date());}

function members(){
  return D.config.departments.flatMap(dept=>
    dept.users.map(u=>({name:typeof u==='string'?u:u.name,joinDate:typeof u==='string'?'':u.joinDate||'',dept:dept.name}))
  );
}
function isActive(m,weekFriday){return !m.joinDate||m.joinDate<=weekFriday;}
function weekStatus(){
  const now=new Date();
  const mon=new Date(UI.currentWeek);mon.setDate(mon.getDate()-4);mon.setHours(0,0,0,0);
  const fri=new Date(UI.currentWeek);fri.setHours(23,59,59,999);
  if(now>=mon&&now<=fri)return 'open';
  return 'closed';
}
function periodRange(){
  const y=UI.year;
  if(UI.period==='year')return[`${y}-01-01`,`${y}-12-31`];
  const q={q1:[`${y}-01-01`,`${y}-03-31`],q2:[`${y}-04-01`,`${y}-06-30`],q3:[`${y}-07-01`,`${y}-09-30`],q4:[`${y}-10-01`,`${y}-12-31`]};
  return q[UI.period];
}
function calcMiss(m){
  const[pStart,pEnd]=periodRange();
  const now=new Date();const cutoff=new Date(now);if(now.getDay()===5){cutoff.setDate(cutoff.getDate()-1);}const cutoffStr=toStr(cutoff);const end=pEnd<cutoffStr?pEnd:cutoffStr;
  const start=m.joinDate&&m.joinDate>pStart?m.joinDate:pStart;
  if(start>end)return null;
  const fridays=[];const d=new Date(start);
  while(toStr(d)<=end){if(d.getDay()===5)fridays.push(toStr(new Date(d)));d.setDate(d.getDate()+1);}
  return fridays.filter(f=>isActive(m,f)&&!D.leaves[`${f}_${m.name}`]&&!D.reports[`${f}_${m.name}`]).length;
}
function toast(msg,type='ok'){UI.toast={msg,type};render();setTimeout(()=>{UI.toast=null;render();},3000);}
// Firebase 儲存（async）
async function saveToFB(k,v){
  // 等待 Firebase module 載入完畢（最多 10 秒）
  let waited=0;
  while(!window._fbReady){
    await new Promise(r=>setTimeout(r,200));
    if((waited+=200)>10000){console.error('Firebase not ready');return;}
  }
  try{
    await window._setDoc(window._fbDoc(window._db,'weeklyhub',k),{data:JSON.stringify(v)});
  }catch(e){console.error('Firebase save error',e);}
}
// 保留 localStorage 作為本地快取
function save(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
  saveToFB(k,v);
}
function load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}

function toggleLeave(weekId,name){
  if(!UI.adminAuth){toast('請先以管理員身分登入','err');return;}
  const k=`${weekId}_${name}`;
  if(D.leaves[k])delete D.leaves[k];else D.leaves[k]=true;
  save('wr_leaves',D.leaves);render();
}
function doSave(){
  if(weekStatus()!=='open'){toast('目前不在填寫期間','err');return;}
  const filled=UI.thisItems.filter(i=>i.trim());
  if(!UI.name||!filled.length){toast('請填寫姓名與本週工作','err');return;}
  D.reports[`${UI.currentWeek}_${UI.name}`]={weekId:UI.currentWeek,userName:UI.name,department:UI.dept,thisWeekItems:filled,nextWeekItems:UI.nextItems.filter(i=>i.trim()),updatedAt:new Date().toLocaleString()};
  save('wr_reports',D.reports);UI.thisPre=UI.thisItems.map(()=>false);UI.editing=true;toast('提交成功！');
}
function saveConfig(){save('wr_config',D.config);toast('設定已儲存');}
function insertTestData(){
  const ms=members();if(!ms.length){toast('請先新增部門與成員','err');return;}
  const pw=prevW(UI.currentWeek);
  ms.forEach(m=>{D.reports[`${pw}_${m.name}`]={weekId:pw,userName:m.name,department:m.dept,thisWeekItems:['完成系統架構設計','進行前端元件開發','修正 Bug #231'],nextWeekItems:['撰寫單元測試','進行 Code Review','更新技術文件'],updatedAt:new Date().toLocaleString()};});
  save('wr_reports',D.reports);toast(`已插入上週假資料（${pw}）`,'info');render();
}
function clearTestData(){
  const pw=prevW(UI.currentWeek);Object.keys(D.reports).forEach(k=>{if(k.startsWith(pw))delete D.reports[k];});
  save('wr_reports',D.reports);toast('已清除測試資料');render();
}
function loadPersonReport(name,weekId){
  const ex=D.reports[`${weekId}_${name}`];
  const prevPlan=D.reports[`${prevW(weekId)}_${name}`]?.nextWeekItems||[];
  if(ex){
    UI.thisItems=[...(ex.thisWeekItems||[''])];
    UI.thisPre=UI.thisItems.map(()=>false);
    while(UI.thisItems.length<5){UI.thisItems.push('');UI.thisPre.push(false);}
    UI.nextItems=[...(ex.nextWeekItems||['','',''])];
    while(UI.nextItems.length<3)UI.nextItems.push('');
    UI.editing=true;
  } else {
    if(prevPlan.length>0){
      const filteredPlan=prevPlan.filter(i=>i.trim());
      UI.thisItems=[...filteredPlan];
      UI.thisPre=filteredPlan.map(()=>true);
      while(UI.thisItems.length<5){UI.thisItems.push('');UI.thisPre.push(false);}
    } else {
      UI.thisItems=['⚠️ 上週沒有寫週報哦，不要再忘記啦~','','','',''];
      UI.thisPre=Array(5).fill(false);
    }
    UI.nextItems=['','','','',''];
    UI.editing=false;
  }
}
function init(){
  // 先從 localStorage 快速載入顯示
  const c=load('wr_config');if(c){D.config.departments=c.departments||[];D.config.adminPassword=c.adminPassword||'0000';}
  const r=load('wr_reports');if(r)Object.assign(D.reports,r);
  const l=load('wr_leaves');if(l)Object.assign(D.leaves,l);
  render();
  // 再從 Firebase 同步最新資料
  loadFromFirebase();
}

async function loadFromFirebase(){
  if(!window._fbReady){setTimeout(loadFromFirebase,500);return;}
  try{
    const db=window._db;
    const keys=['wr_config','wr_reports','wr_leaves'];
    for(const k of keys){
      const snap=await window._getDoc(window._fbDoc(db,'weeklyhub',k));
      if(snap.exists){
        const v=JSON.parse(snap.data().data);
        localStorage.setItem(k,JSON.stringify(v));
        if(k==='wr_config'){D.config.departments=v.departments||[];D.config.adminPassword=v.adminPassword||'0000';}
        if(k==='wr_reports')Object.assign(D.reports,v);
        if(k==='wr_leaves')Object.assign(D.leaves,v);
      }
    }
    render();
    // 監聽即時更新
    window._onSnapshot(window._fbDoc(db,'weeklyhub','wr_reports'),(snap)=>{
      if(snap.exists){
        const v=JSON.parse(snap.data().data);
        Object.assign(D.reports,v);
        localStorage.setItem('wr_reports',JSON.stringify(D.reports));
        render();
      }
    });
    window._onSnapshot(window._fbDoc(db,'weeklyhub','wr_leaves'),(snap)=>{
      if(snap.exists){
        const v=JSON.parse(snap.data().data);
        Object.assign(D.leaves,v);
        render();
      }
    });
  }catch(e){console.error('Firebase load error',e);}
}

function render(){
  document.getElementById('app').innerHTML=build();
  attachDrag();
  setTimeout(()=>{
    function adjustAll(){
  const lineH=36;
  document.querySelectorAll('textarea[id^="il_"]').forEach(t=>{
    t.style.height='36px';
    if(t.value.trim()){
      // 先用換行符號數量判斷
      const lines=t.value.split('\n').length;

<script>
const DEPT_KEYWORDS=['開發','營運','行銷','編輯','設計','商務','行政','數據'];
function sheetNameToWeekId(name){
  // 取頁簽名前四碼數字，例如 '1206'（週六）→ 找當週週五
  name=name.trim();
  const m=name.match(/^(\d{2})(\d{2})/);
  if(!m)return null;
  const month=parseInt(m[1]),day=parseInt(m[2]);
  // 月份 10~12 → 2025，其他 → 2026
  const year=(month>=10)?2025:2026;
  try{
    const d=new Date(year,month-1,day);
    if(isNaN(d.getTime()))return null;
    // 往前找最近的週五（weekday 5=週六, 4=週五, 0=週日...）
    // getDay(): 0=日,1=一,2=二,3=三,4=四,5=五,6=六
    const dow=d.getDay();
    let offset=0;
    if(dow===6) offset=1;       // 週六 → 前一天週五
    else if(dow===0) offset=2;  // 週日 → 前兩天週五
    else if(dow===1) offset=3;  // 週一 → 前三天週五
    else if(dow===2) offset=4;  // 週二 → 前四天週五
    else if(dow===3) offset=5;  // 週三 → 前五天週五
    else if(dow===4) offset=6;  // 週四 → 前六天週五
    // dow===5 週五 → offset=0
    d.setDate(d.getDate()-offset);
    const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');
    return `${y}-${mo}-${dy}`;
  }catch(e){return null;}
}
function parseSheet(rows){
  let currentDept='',currentName='';const results={};
  for(const row of rows){
    const colA=String(row[0]||'').trim();
    const colB=row[1];
    const colC=String(row[2]||'').trim();
    const colD=String(row[3]||'').trim();
    // 部門列：A欄是部門關鍵字，B欄是空的
    if(DEPT_KEYWORDS.includes(colA)&&(colB===undefined||colB===null||colB==='')){
      currentDept=colA;continue;
    }
    // 人員列：A欄有姓名（非部門關鍵字、非標題）
    if(colA&&colA!=='人員'&&!DEPT_KEYWORDS.includes(colA)){
      currentName=colA;
      if(!results[currentName])results[currentName]={dept:currentDept,thisWeek:[],nextWeek:[]};
    }
    // 資料列：B欄是數字（編號），收集 C、D 欄內容
    const bNum=parseFloat(String(colB||''));
    if(currentName&&!isNaN(bNum)&&bNum>0){
      if(colC)results[currentName].thisWeek.push(colC);
      if(colD)results[currentName].nextWeek.push(colD);
    }
  }
  return results;
}
window.doXlsxImport=function(){
  const input=document.getElementById('xlsxUpload');
  const file=input?input.files[0]:null;
  if(!file){alert('請先選擇 Excel 檔案');return;}
  const status=document.getElementById('importStatus');
  status.style.color='#6b7280';status.textContent='解析中...';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let totalAdded=0,totalUpdated=0,totalSheets=0;
      const forceOverwrite=document.getElementById('xlsxOverwrite')?.checked||false;
      for(const sheetName of wb.SheetNames){
        const friday=sheetNameToWeekId(sheetName);
        if(!friday)continue;
        const ws=wb.Sheets[sheetName];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const parsed=parseSheet(rows);
        let sheetChanged=0;
        for(const [person,data] of Object.entries(parsed)){
          if(!data.thisWeek.length&&!data.nextWeek.length)continue;
          const key=`${friday}_${person}`;
          if(!D.reports[key]){
            D.reports[key]={weekId:friday,userName:person,department:data.dept,thisWeekItems:data.thisWeek,nextWeekItems:data.nextWeek,updatedAt:'匯入自 Excel'};
            totalAdded++;sheetChanged++;
          }else if(forceOverwrite){
            D.reports[key]={...D.reports[key],thisWeekItems:data.thisWeek,nextWeekItems:data.nextWeek,updatedAt:'匯入自 Excel（覆蓋）'};
            totalUpdated++;sheetChanged++;
          }
        }
        if(sheetChanged>0)totalSheets++;
      }
      try{localStorage.setItem('wr_reports',JSON.stringify(D.reports));}catch(e){}
      status.style.color='#166534';
      status.textContent=`✅ 完成！新增 ${totalAdded} 筆、覆蓋更新 ${totalUpdated} 筆（共 ${totalSheets} 週）。`;
      input.value='';render();
    }catch(err){status.style.color='#991b1b';status.textContent='❌ 解析失敗：'+err.message;}
  };
  reader.readAsArrayBuffer(file);
};

window.doXlsxExport=function(){
  const status=document.getElementById('exportStatus');
  status.style.color='#6b7280';status.textContent='產生中...';
  try{
    const allR=Object.assign({},HISTORY_REPORTS,D.reports);
    // 依 weekId 分組
    const byWeek={};
    for(const[k,r] of Object.entries(allR)){
      const wid=r.weekId||k.split('_')[0];
      if(!byWeek[wid])byWeek[wid]=[];
      byWeek[wid].push(r);
    }
    const weekIds=Object.keys(byWeek).sort();
    if(!weekIds.length){status.style.color='#991b1b';status.textContent='❌ 沒有資料可匯出';return;}

    const wb=XLSX.utils.book_new();

    for(const wid of weekIds){
      const records=byWeek[wid];
      // 頁簽名稱：weekId 是週五日期，直接用週五的 MMDD
      const d=new Date(wid);
      const mo=String(d.getMonth()+1).padStart(2,'0');
      const dy=String(d.getDate()).padStart(2,'0');
      const sheetName=mo+dy;

      // 依部門分組
      const byDept={};
      for(const r of records){
        const dept=r.department||'其他';
        if(!byDept[dept])byDept[dept]=[];
        byDept[dept].push(r);
      }

      const rows=[];
      // 標題列
      rows.push([null,'填寫規定','1. 請每週五下午18:00前完成更新']);
      rows.push(['人員','編號','當週進度','下週進度']);

      // 依部門順序輸出
      const deptOrder=['開發','營運','行銷','編輯','設計','商務','行政','數據','其他'];
      let rowIdx=3;
      for(const dept of deptOrder){
        if(!byDept[dept])continue;
        rows.push([dept,null,null,null]);
        rowIdx++;
        for(const r of byDept[dept]){
          const thisW=(r.thisWeekItems||[]).filter(s=>s&&s.trim());
          const nextW=(r.nextWeekItems||[]).filter(s=>s&&s.trim());
          // 合併成一大格，用換行連接
          const thisCell=thisW.join('\n')||null;
          const nextCell=nextW.join('\n')||null;
          rows.push([r.userName,1,thisCell,nextCell]);
          rowIdx++;
        }
      }

      const ws=XLSX.utils.aoa_to_sheet(rows);
      // 設定欄寬
      ws['!cols']=[{wch:12},{wch:6},{wch:60},{wch:60}];
      XLSX.utils.book_append_sheet(wb,ws,sheetName);
    }

    // 產生今日日期作為檔名
    const now=new Date();
    const fname='週報統整_'+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'.xlsx';
    XLSX.writeFile(wb,fname);
    status.style.color='#166534';
    status.textContent='✅ 已下載 '+weekIds.length+' 週資料！';
  }catch(err){status.style.color='#991b1b';status.textContent='❌ 匯出失敗：'+err.message;}
};
