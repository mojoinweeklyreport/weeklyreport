<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeeklyHub 週報系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;color:#1a1a1a;background:#f8fafc;padding:16px}
.nav{display:flex;gap:4px;padding:12px 0 16px;border-bottom:1px solid #e5e7eb;margin-bottom:20px}
.nav button{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;color:#6b7280;transition:all .15s}
.nav button.active{background:#f3f4f6;color:#111827;font-weight:500}
.card{background:#fff;border:0.5px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:500;color:#6b7280;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
textarea{width:100%;padding:8px 10px;border:0.5px solid #d1d5db;border-radius:8px;font-size:14px;background:#fff;color:#111827;outline:none;resize:none;overflow:hidden;min-height:36px;height:36px;line-height:1.5;font-family:inherit}
textarea:focus{border-color:#9ca3af}
textarea.prefilled{background:#fffbeb;border-color:#fcd34d}
input[type=text],input[type=password],input[type=date],select{width:100%;padding:8px 10px;border:0.5px solid #d1d5db;border-radius:8px;font-size:14px;background:#fff;color:#111827;outline:none}
input:focus,select:focus{border-color:#9ca3af}
.btn{padding:8px 16px;border:0.5px solid #d1d5db;border-radius:8px;cursor:pointer;font-size:13px;background:#fff;color:#111827;transition:all .15s}
.btn:hover{background:#f3f4f6}
.btn-primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
.btn-primary:hover{background:#2563eb}
.btn-sm{padding:4px 10px;font-size:12px}
.toast{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;border:0.5px solid;max-width:280px}
.toast.ok{background:#dcfce7;color:#166534;border-color:#86efac}
.toast.err{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.toast.info{background:#fef9c3;color:#854d0e;border-color:#fcd34d}
.row{display:flex;gap:8px;align-items:center}
.missing-tag{display:inline-block;padding:2px 8px;background:#fee2e2;color:#991b1b;border:0.5px solid #fca5a5;border-radius:20px;font-size:11px;margin-top:3px}
.leave-tag{display:inline-block;padding:2px 8px;background:#f3f4f6;color:#6b7280;border:0.5px solid #d1d5db;border-radius:20px;font-size:11px;margin-top:3px}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:0.5px solid #e5e7eb;border-radius:8px;margin-bottom:8px}
.item-line{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.item-line .idx{font-size:12px;color:#6b7280;width:16px;text-align:right;flex-shrink:0}
.item-line input{flex:1;min-width:0}
.item-line input.prefilled{border-color:#fcd34d;background:#fffbeb}
.del-btn{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0;opacity:.5;transition:opacity .15s}
.del-btn:hover{opacity:1;color:#dc2626}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #93c5fd;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.report-block{border:0.5px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px}
.report-block.on-leave{background:#f9fafb;opacity:.8}
.dept-anchor{display:inline-block;font-size:13px;font-weight:500;color:#2563eb;background:#eff6ff;border:0.5px solid #bfdbfe;border-radius:20px;padding:3px 12px;cursor:pointer;white-space:nowrap}
.dept-anchor:hover{background:#dbeafe}
.dept-section-title{font-size:11px;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;padding:12px 0 8px;border-top:0.5px solid #e5e7eb;margin-top:4px}
.dept-section-title:first-of-type{border-top:none;padding-top:0;margin-top:0}
.period-tab{padding:5px 14px;border:0.5px solid #d1d5db;border-radius:20px;cursor:pointer;font-size:13px;background:#fff;color:#6b7280;transition:all .15s}
.period-tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.period-tab:hover:not(.active){background:#f3f4f6}
.locked-box{background:#f9fafb;border:0.5px solid #e5e7eb;border-radius:12px;padding:32px 20px;text-align:center;margin-bottom:14px}
.member-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f9fafb;border-radius:8px;margin-bottom:4px;cursor:grab;user-select:none;border:0.5px solid transparent}
.member-row.dragging{opacity:.4}
.member-row.drag-over{border-color:#3b82f6;background:#eff6ff}
.drag-handle{color:#9ca3af;font-size:14px;padding:0 2px;opacity:.5}
.leave-btn{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid #d1d5db;background:#fff;color:#6b7280;cursor:pointer;white-space:nowrap;transition:all .15s}
.leave-btn:hover{background:#f3f4f6}
.leave-btn.cancel{color:#dc2626;border-color:#fca5a5}
.leave-btn.cancel:hover{background:#fee2e2}
</style>

<script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyD7vp7I2UIa10jH3-OgdvEHuoji7a6DTks",
  authDomain: "weeklyhub-423c5.firebaseapp.com",
  projectId: "weeklyhub-423c5",
  storageBucket: "weeklyhub-423c5.firebasestorage.app",

<div style="max-width:800px;margin:0 auto">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
    <div style="background:#3b82f6;padding:6px;border-radius:8px;display:flex">
      <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

<button id="goTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="display:none;position:fixed;bottom:24px;right:20px;z-index:999;background:#3b82f6;color:#fff;border:none;border-radius:50%;width:42px;height:42px;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18);line-height:42px;text-align:center">↑</button>

<script>
const D={leaves:{},reports:{},config:{departments:[],adminPassword:'0000'}};
const UI={
  view:'report',adminWeek:getFriday(new Date()),currentWeek:getFriday(new Date()),
  dept:'',name:'',thisItems:['','','','',''],thisPre:Array(5).fill(false),
  nextItems:['','',''],editing:false,adminAuth:false,
  period:'year',year:new Date().getFullYear(),toast:null,drag:null,
  _newDept:'',_newU:{},_newUDate:{}
};

function toStr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function getFriday(date){const d=new Date(date);d.setHours(0,0,0,0);const wd=d.getDay();d.setDate(d.getDate()-wd+(wd===0?-2:5));return toStr(d);}
function getMonday(fri){const d=new Date(fri);d.setDate(d.getDate()-4);return toStr(d);}
function prevW(w){const d=new Date(w);d.setDate(d.getDate()-7);return toStr(d);}
function nextW(w){const d=new Date(w);d.setDate(d.getDate()+7);return toStr(d);}
function todayStr(){return toStr(new Date());}

function members(){
  return D.config.departments.flatMap(dept=>
    dept.users.map(u=>({name:typeof u==='string'?u:u.name,joinDate:typeof u==='string'?'':u.joinDate||'',dept:dept.name}))
  );
}
function isActive(m,weekFriday){return !m.joinDate||m.joinDate<=weekFriday;}
function weekStatus(){
  const now=new Date();
  const mon=new Date(UI.currentWeek);mon.setDate(mon.getDate()-4);mon.setHours(0,0,0,0);
  const fri=new Date(UI.currentWeek);fri.setHours(23,59,59,999);
  if(now>=mon&&now<=fri)return 'open';
  return 'closed';
}
function periodRange(){
  const y=UI.year;
  if(UI.period==='year')return[`${y}-01-01`,`${y}-12-31`];
  const q={q1:[`${y}-01-01`,`${y}-03-31`],q2:[`${y}-04-01`,`${y}-06-30`],q3:[`${y}-07-01`,`${y}-09-30`],q4:[`${y}-10-01`,`${y}-12-31`]};
  return q[UI.period];
}
function calcMiss(m){
  const[pStart,pEnd]=periodRange();
  const now=new Date();const cutoff=new Date(now);if(now.getDay()===5){cutoff.setDate(cutoff.getDate()-1);}const cutoffStr=toStr(cutoff);const end=pEnd<cutoffStr?pEnd:cutoffStr;
  const start=m.joinDate&&m.joinDate>pStart?m.joinDate:pStart;
  if(start>end)return null;
  const fridays=[];const d=new Date(start);
  while(toStr(d)<=end){if(d.getDay()===5)fridays.push(toStr(new Date(d)));d.setDate(d.getDate()+1);}
  return fridays.filter(f=>isActive(m,f)&&!D.leaves[`${f}_${m.name}`]&&!D.reports[`${f}_${m.name}`]).length;
}
function toast(msg,type='ok'){UI.toast={msg,type};render();setTimeout(()=>{UI.toast=null;render();},3000);}
// Firebase 儲存（async）
async function saveToFB(k,v){
  try{
    await window._setDoc(window._doc(window._db,'weeklyhub',k),{data:JSON.stringify(v)});
  }catch(e){console.error('Firebase save error',e);}
}
// 保留 localStorage 作為本地快取
function save(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
  saveToFB(k,v);
}
function load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}

function toggleLeave(weekId,name){
  if(!UI.adminAuth){toast('請先以管理員身分登入','err');return;}
  const k=`${weekId}_${name}`;
  if(D.leaves[k])delete D.leaves[k];else D.leaves[k]=true;
  save('wr_leaves',D.leaves);render();
}
function doSave(){
  if(weekStatus()!=='open'){toast('目前不在填寫期間','err');return;}
  const filled=UI.thisItems.filter(i=>i.trim());
  if(!UI.name||!filled.length){toast('請填寫姓名與本週工作','err');return;}
  D.reports[`${UI.currentWeek}_${UI.name}`]={weekId:UI.currentWeek,userName:UI.name,department:UI.dept,thisWeekItems:filled,nextWeekItems:UI.nextItems.filter(i=>i.trim()),updatedAt:new Date().toLocaleString()};
  save('wr_reports',D.reports);UI.thisPre=UI.thisItems.map(()=>false);UI.editing=true;toast('提交成功！');
}
function saveConfig(){save('wr_config',D.config);toast('設定已儲存');}
function insertTestData(){
  const ms=members();if(!ms.length){toast('請先新增部門與成員','err');return;}
  const pw=prevW(UI.currentWeek);
  ms.forEach(m=>{D.reports[`${pw}_${m.name}`]={weekId:pw,userName:m.name,department:m.dept,thisWeekItems:['完成系統架構設計','進行前端元件開發','修正 Bug #231'],nextWeekItems:['撰寫單元測試','進行 Code Review','更新技術文件'],updatedAt:new Date().toLocaleString()};});
  save('wr_reports',D.reports);toast(`已插入上週假資料（${pw}）`,'info');render();
}
function clearTestData(){
  const pw=prevW(UI.currentWeek);Object.keys(D.reports).forEach(k=>{if(k.startsWith(pw))delete D.reports[k];});
  save('wr_reports',D.reports);toast('已清除測試資料');render();
}
function loadPersonReport(name,weekId){
  const ex=D.reports[`${weekId}_${name}`];
  const prevPlan=D.reports[`${prevW(weekId)}_${name}`]?.nextWeekItems||[];
  if(ex){
    UI.thisItems=[...(ex.thisWeekItems||[''])];
    UI.thisPre=UI.thisItems.map(()=>false);
    while(UI.thisItems.length<5){UI.thisItems.push('');UI.thisPre.push(false);}
    UI.nextItems=[...(ex.nextWeekItems||['','',''])];
    while(UI.nextItems.length<3)UI.nextItems.push('');
    UI.editing=true;
  } else {
    if(prevPlan.length>0){
      const filteredPlan=prevPlan.filter(i=>i.trim());
      UI.thisItems=[...filteredPlan];
      UI.thisPre=filteredPlan.map(()=>true);
      while(UI.thisItems.length<5){UI.thisItems.push('');UI.thisPre.push(false);}
    } else {
      UI.thisItems=['','','','',''];
      UI.thisPre=Array(5).fill(false);
    }
    UI.nextItems=['','','','',''];
    UI.editing=false;
  }
}
function init(){
  // 先從 localStorage 快速載入顯示
  const c=load('wr_config');if(c){D.config.departments=c.departments||[];D.config.adminPassword=c.adminPassword||'0000';}
  const r=load('wr_reports');if(r)Object.assign(D.reports,r);
  const l=load('wr_leaves');if(l)Object.assign(D.leaves,l);
  render();
  // 再從 Firebase 同步最新資料
  loadFromFirebase();
}

async function loadFromFirebase(){
  if(!window._fbReady){setTimeout(loadFromFirebase,500);return;}
  try{
    const db=window._db;
    const keys=['wr_config','wr_reports','wr_leaves'];
    for(const k of keys){
      const snap=await window._getDoc(window._doc(db,'weeklyhub',k));
      if(snap.exists()){
        const v=JSON.parse(snap.data().data);
        localStorage.setItem(k,JSON.stringify(v));
        if(k==='wr_config'){D.config.departments=v.departments||[];D.config.adminPassword=v.adminPassword||'0000';}
        if(k==='wr_reports')Object.assign(D.reports,v);
        if(k==='wr_leaves')Object.assign(D.leaves,v);
      }
    }
    render();
    // 監聽即時更新
    window._onSnapshot(window._doc(db,'weeklyhub','wr_reports'),(snap)=>{
      if(snap.exists()){
        const v=JSON.parse(snap.data().data);
        Object.assign(D.reports,v);
        localStorage.setItem('wr_reports',JSON.stringify(D.reports));
        render();
      }
    });
    window._onSnapshot(window._doc(db,'weeklyhub','wr_leaves'),(snap)=>{
      if(snap.exists()){
        const v=JSON.parse(snap.data().data);
        Object.assign(D.leaves,v);
        render();
      }
    });
  }catch(e){console.error('Firebase load error',e);}
}

function render(){
  document.getElementById('app').innerHTML=build();
  attachDrag();
  setTimeout(()=>{
    function adjustAll(){
  const lineH=36;
  document.querySelectorAll('textarea[id^="il_"]').forEach(t=>{
    t.style.height='36px';
    if(t.value.trim()){
      // 先用換行符號數量判斷
      const lines=t.value.split('\n').length;
      if(lines>1){
        t.style.height='auto';
        t.style.height=t.scrollHeight+'px';
      }
    }
  });
}
    adjustAll();
    window._resizeHandler&&window.removeEventListener('resize',window._resizeHandler);
    window._resizeHandler=adjustAll;
    window.addEventListener('resize',window._resizeHandler);
  },50);
  // 還原設定頁輸入框值
  const nd=document.getElementById('newDept');if(nd)nd.value=UI._newDept||'';
  D.config.departments.forEach((_,di)=>{
    const nu=document.getElementById(`newU_${di}`);if(nu)nu.value=UI._newU[di]||'';
    const nud=document.getElementById(`newUDate_${di}`);if(nud)nud.value=UI._newUDate[di]||'';
  });
}

function build(){
  const ms=members();
  const status=weekStatus();
  const monday=getMonday(UI.currentWeek);
  const adminMonday=getMonday(UI.adminWeek);
  const selDeptObj=D.config.departments.find(d=>d.name===UI.dept);
  const deptUsers=(selDeptObj?.users||[]).map(u=>typeof u==='string'?u:u.name);
  const hasPre=UI.thisPre.some(Boolean);
  const prevWId=prevW(UI.currentWeek);
  const hasPrevData=ms.some(m=>D.reports[`${prevWId}_${m.name}`]);
  const wReports=Object.values(D.reports).filter(r=>r.weekId===UI.adminWeek);
  const activeMembers=ms.filter(m=>isActive(m,UI.adminWeek));
  const stats=ms.map(m=>({name:m.name,miss:calcMiss(m)})).filter(s=>s.miss!==null).sort((a,b)=>b.miss-a.miss);
  const[pStart,pEnd]=periodRange();
  const icons=['🥇','🥈','🥉'];
  const thisYear=new Date().getFullYear();
  const years=[thisYear,thisYear-1,thisYear-2];
  const periods=[{key:'year',label:'全年'},{key:'q1',label:'Q1'},{key:'q2',label:'Q2'},{key:'q3',label:'Q3'},{key:'q4',label:'Q4'}];
  const badge=status==='open'
    ?`<span style="font-size:11px;color:#166534;background:#dcfce7;border:0.5px solid #86efac;padding:1px 8px;border-radius:20px;margin-left:8px">填寫中</span>`
    :`<span style="font-size:11px;color:#991b1b;background:#fee2e2;border:0.5px solid #fca5a5;padding:1px 8px;border-radius:20px;margin-left:8px">已截止</span>`;

  function ilines(items,pre,type){
    return items.map((v,i)=>{
      const p=pre&&pre[i];
      const escaped=v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<div class="item-line"><span class="idx">${i+1}</span><textarea id="il_${type}_${i}" class="${p?'prefilled':''}" placeholder="${p?'可直接修改...':'新增項目...'}" oninput="UI.${type==='this'?'thisItems':'nextItems'}[${i}]=this.value;${p?`UI.thisPre[${i}]=false;`:''}this.style.height='36px';if(this.value.split('\\n').length>1){this.style.height='auto';this.style.height=this.scrollHeight+'px';}">${escaped}</textarea><button class="del-btn" onclick="delItem('${type}',${i})">×</button></div>`;
    }).join('');
  }

  let reportHtml='';
  if(status!=='open'){
    reportHtml=`<div class="card"><div style="font-size:18px;font-weight:700">填寫週報</div><div style="font-size:13px;color:#6b7280">${monday} ～ ${UI.currentWeek}${badge}</div></div><div style="background:#fff0f0;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:15px;color:#dc2626;font-weight:500">⚠️ 填寫完畢請務必按最底下的「<span style="font-size:17px;font-weight:700">提交週報</span>」按鈕！<br><span style="font-size:13px;font-weight:400">提交後需要修改可以再按「更新內容」按鈕</span></div><div class="locked-box"><div style="font-size:28px;margin-bottom:12px">🔒</div><div style="font-size:15px;font-weight:500;margin-bottom:6px">本週已截止</div><div style="font-size:13px;color:#6b7280">填寫期間為每週一 00:00 ～ 週五 23:59</div></div>`;
  } else {
    reportHtml=`

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div><div style="font-size:18px;font-weight:700">填寫週報</div><div style="font-size:13px;color:#6b7280">${monday} ～ ${UI.currentWeek}${badge}</div></div><div style="background:#fff0f0;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:15px;color:#dc2626;font-weight:500">⚠️ 填寫完畢請務必按最底下的「<span style="font-size:17px;font-weight:700">提交週報</span>」按鈕！<br><span style="font-size:13px;font-weight:400">提交後需要修改可以再按「更新內容」按鈕</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <select style="width:auto" onchange="UI.dept=this.value;UI.name='';UI.thisItems=['','','','',''];UI.thisPre=Array(5).fill(false);UI.nextItems=['','',''];UI.editing=false;render()">
        <option value="">選擇部門</option>${D.config.departments.map(d=>`<option value="${d.name}"${UI.dept===d.name?' selected':''}>${d.name}</option>`).join('')}
      </select>
      <select style="width:auto" onchange="UI.name=this.value;if(this.value)loadPersonReport(this.value,UI.currentWeek);render()">
        <option value="">選擇姓名</option>${deptUsers.map(u=>`<option value="${u}"${UI.name===u?' selected':''}>${u}</option>`).join('')}
      </select>

function attachDrag(){
  document.querySelectorAll('.member-row').forEach(row=>{
    row.addEventListener('dragstart',()=>{UI.drag={di:+row.dataset.di,ui:+row.dataset.ui};setTimeout(()=>row.classList.add('dragging'),0);});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('.member-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.member-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');});
    row.addEventListener('drop',e=>{
      e.preventDefault();const ti=+row.dataset.di,tu=+row.dataset.ui,{di:si,ui:su}=UI.drag;
      if(si!==ti||su===tu)return;
      const us=D.config.departments[si].users;const[mv]=us.splice(su,1);us.splice(tu,0,mv);
      save('wr_config',D.config);render();
    });
  });
}

window.loadPersonReport=loadPersonReport;

window.addUser=di=>{
  const name=(UI._newU[di]||'').trim();
  const jd=UI._newUDate[di]||'';
  if(!name)return;
  D.config.departments[di].users.push({name,joinDate:jd});
  UI._newU[di]='';UI._newUDate[di]='';
  saveConfig();render();
};
window.delUser=(di,ui)=>{D.config.departments[di].users.splice(ui,1);saveConfig();render();};
window.clearAllData=()=>{
  // 顯示自訂確認框
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`<div style="background:#fff;border-radius:12px;padding:24px;max-width:300px;width:90%;text-align:center">
    <div style="font-size:28px;margin-bottom:10px">⚠️</div>
    <div style="font-size:15px;font-weight:500;margin-bottom:8px">確定清除所有資料？</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:20px">部門、成員、週報、休假記錄將全部刪除，無法還原。</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button id="cancelClear" style="padding:8px 20px;border:0.5px solid #d1d5db;border-radius:8px;cursor:pointer;font-size:13px;background:#fff">取消</button>
      <button id="confirmClear" style="padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;background:#dc2626;color:#fff">確認清除</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('cancelClear').onclick=()=>overlay.remove();
  document.getElementById('confirmClear').onclick=()=>{
    overlay.remove();
    ['wr_config','wr_reports','wr_leaves'].forEach(k=>localStorage.removeItem(k));
    D.config.departments=[];D.config.adminPassword='0000';
    Object.keys(D.reports).forEach(k=>delete D.reports[k]);
    Object.keys(D.leaves).forEach(k=>delete D.leaves[k]);
    UI.adminAuth=false;UI.dept='';UI.name='';UI.view='report';
    toast('已清除所有資料');render();
  };
};
window.prevW=prevW;window.nextW=nextW;

// 等 Firebase SDK 載入後再 init
if(window._fbReady){init();}else{window._initApp=init;setTimeout(()=>{if(!window._fbReady)init();},1000);}

window.importHistory = function(){
  let existing = {};
  try{ const v=localStorage.getItem('wr_reports'); if(v)existing=JSON.parse(v); }catch(e){}
  let added=0;
  for(const [k,v] of Object.entries(HISTORY_REPORTS)){
    if(!existing[k]){ existing[k]=v; added++; }
    // 同步到 D.reports
    if(!D.reports[k]) D.reports[k]=v;
  }
  localStorage.setItem('wr_reports',JSON.stringify(existing));
  toast(`匯入完成！新增 ${added} 筆歷史週報資料`,'ok');
  render();
};

<script>
const DEPT_KEYWORDS=['開發','營運','行銷','編輯','設計','商務','行政','數據'];
function sheetNameToFriday(name){
  name=name.trim().split('（')[0].split('(')[0].trim();
  const m=name.match(/^(\d{2})(\d{2})$/);
  if(!m)return null;
  const month=parseInt(m[1]),day=parseInt(m[2]);
  const year=(month>=10)?2025:2026;
  try{const d=new Date(year,month-1,day);if(isNaN(d.getTime()))return null;
  const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');
  return `${y}-${mo}-${dy}`;}catch(e){return null;}
}
function parseSheet(rows){
  let currentDept='',currentName='';const results={};
  for(const row of rows){
    const colA=String(row[0]||'').trim();const colB=row[1];
    const colC=String(row[2]||'').trim();const colD=String(row[3]||'').trim();
    if(DEPT_KEYWORDS.includes(colA)&&(colB===undefined||colB===null||colB===''))
      {currentDept=colA;continue;}
    if(colA&&!DEPT_KEYWORDS.includes(colA)&&typeof colB==='number')
      {currentName=colA;if(!results[currentName])results[currentName]={dept:currentDept,thisWeek:[],nextWeek:[]};}
    if(currentName&&typeof colB==='number'){if(colC)results[currentName].thisWeek.push(colC);if(colD)results[currentName].nextWeek.push(colD);}
  }
  return results;
}
window.doXlsxImport=function(){
  const input=document.getElementById('xlsxUpload');
  const file=input?input.files[0]:null;
  if(!file){alert('請先選擇 Excel 檔案');return;}
  const status=document.getElementById('importStatus');
  status.style.color='#6b7280';status.textContent='解析中...';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let totalAdded=0,totalUpdated=0,totalSheets=0;
      const forceOverwrite=document.getElementById('xlsxOverwrite')?.checked||false;
      for(const sheetName of wb.SheetNames){
        const friday=sheetNameToFriday(sheetName);
        if(!friday||friday<'2026-01-01')continue;
        const ws=wb.Sheets[sheetName];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const parsed=parseSheet(rows);
        let sheetChanged=0;
        for(const [person,data] of Object.entries(parsed)){
          if(!data.thisWeek.length&&!data.nextWeek.length)continue;
          const key=`${friday}_${person}`;
          if(!D.reports[key]){
            D.reports[key]={weekId:friday,userName:person,department:data.dept,thisWeekItems:data.thisWeek,nextWeekItems:data.nextWeek,updatedAt:'匯入自 Excel'};
            totalAdded++;sheetChanged++;
          }else if(forceOverwrite){
            D.reports[key]={...D.reports[key],thisWeekItems:data.thisWeek,nextWeekItems:data.nextWeek,updatedAt:'匯入自 Excel（覆蓋）'};
            totalUpdated++;sheetChanged++;
          }
        }
        if(sheetChanged>0)totalSheets++;
      }
      try{localStorage.setItem('wr_reports',JSON.stringify(D.reports));}catch(e){}
      status.style.color='#166534';
      status.textContent=`✅ 完成！新增 ${totalAdded} 筆、覆蓋更新 ${totalUpdated} 筆（共 ${totalSheets} 週）。`;
      input.value='';render();
    }catch(err){status.style.color='#991b1b';status.textContent='❌ 解析失敗：'+err.message;}
  };
  reader.readAsArrayBuffer(file);
};
</script>
